components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API_KEY
      description: |
        Authenticate using your CarrierShark company API key.

        Example:

        Authorization: Bearer cs_live_your_api_key_here
  headers:
    X-RateLimit-Limit:
      schema:
        type: integer
      description: Maximum number of requests allowed in the current window.
    X-RateLimit-Remaining:
      schema:
        type: integer
      description: Requests remaining in the current rate limit window.
    X-RateLimit-Reset:
      schema:
        type: integer
      description: UNIX timestamp when the rate limit window resets.
  parameters:
    DotPath:
      name: dot
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9]+$'
        example: "336075"
      description: USDOT number.
    DotQuery:
      name: dot
      in: query
      schema:
        type: string
        pattern: '^[0-9]+$'
        example: "336075"
      description: USDOT number.
    PageQuery:
      name: page
      in: query
      description: Page number of results (starting at 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      description: Number of results per page (maximum 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    UnauthorizedError:
      description: Missing or invalid API authorization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not authorized
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    InsuranceSummary:
      type: object
      required:
        - has_on_file
        - has_structured_coverages
        - is_expired
        - next_expiration_date
        - auto_liability_limit
        - cargo_limit
        - general_liability_limit
        - coverage_count
      properties:
        has_on_file:
          type: boolean
        has_structured_coverages:
          type: boolean
        is_expired:
          type: boolean
        next_expiration_date:
          type: string
          format: date
          nullable: true
        auto_liability_limit:
          type: number
          nullable: true
        cargo_limit:
          type: number
          nullable: true
        general_liability_limit:
          type: number
          nullable: true
        coverage_count:
          type: integer
    InsuranceCoverage:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
              format: uuid
          nullable: true
        document_id:
          oneOf:
            - type: integer
            - type: string
              format: uuid
          nullable: true
        coverage_type:
          type: string
          enum:
            - AUTO LIABILITY
            - CARGO
            - GENERAL LIABILITY
            - WORKERS COMP
            - OTHER
        insurer_name:
          type: string
          nullable: true
        policy_number:
          type: string
          nullable: true
        effective_date:
          type: string
          format: date
          nullable: true
        expiration_date:
          type: string
          format: date
          nullable: true
        limit_amount:
          type: number
          nullable: true
        status:
          type: string
          enum: [ACTIVE, EXPIRED]
        is_expired:
          type: boolean
    Carrier:
      type: object
      description: |
        Carrier row selected from `carriers` as `c.*` plus a compatibility alias `dot`.
        Fields listed below are the stable/common fields documented by the API.
      properties:
        dot:
          type: string
        dotnumber:
          type: string
        legalname:
          type: string
          nullable: true
        dbaname:
          type: string
          nullable: true
        mc_number:
          type: string
          nullable: true
        phystreet:
          type: string
          nullable: true
        phycity:
          type: string
          nullable: true
        phystate:
          type: string
          nullable: true
        phyzipcode:
          type: string
          nullable: true
        phycountry:
          type: string
          nullable: true
        allowedtooperate:
          type: string
          nullable: true
        safetyrating:
          type: string
          nullable: true
        statuscode:
          type: string
          nullable: true
        totaldrivers:
          type: integer
          nullable: true
        totalpowerunits:
          type: integer
          nullable: true
        retrieval_date:
          type: string
          format: date-time
          nullable: true
        last_polled_at:
          type: string
          format: date-time
          nullable: true
        insurance_summary:
          $ref: '#/components/schemas/InsuranceSummary'
      additionalProperties: true
    CarrierListResponse:
      type: object
      required: [rows, total, page, pageSize]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/Carrier'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    SavedCarrier:
      allOf:
        - $ref: '#/components/schemas/Carrier'
        - type: object
          properties:
            added_at:
              type: string
              format: date-time
    SavedCarrierListResponse:
      type: object
      required: [rows, total, page, pageSize]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/SavedCarrier'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    CarrierDetail:
      type: object
      description: Carrier detail row from `/carriers/{dot}` including derived cargo and compatibility fields.
      allOf:
        - $ref: '#/components/schemas/Carrier'
        - type: object
          properties:
            address1:
              type: string
              nullable: true
            address2:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            state:
              type: string
              nullable: true
            zip:
              type: string
              nullable: true
            retrieval_date_formatted:
              type: string
              nullable: true
            cargo_carried:
              type: array
              items:
                type: string
            insurance_summary:
              $ref: '#/components/schemas/InsuranceSummary'
            insurance_coverages:
              type: array
              items:
                $ref: '#/components/schemas/InsuranceCoverage'
          additionalProperties: true
    CarrierMutationSummary:
      type: object
      required: [totalSubmitted, inserted, duplicates, invalid]
      properties:
        totalSubmitted:
          type: integer
        inserted:
          type: integer
        duplicates:
          type: integer
        invalid:
          type: integer
    CarrierMutationDetail:
      type: object
      required: [dot, status]
      properties:
        dot:
          type: string
        status:
          type: string
          enum: [inserted, already_saved, invalid]
    CarrierMutationResponse:
      type: object
      required: [summary, details]
      properties:
        summary:
          $ref: '#/components/schemas/CarrierMutationSummary'
        details:
          type: array
          items:
            $ref: '#/components/schemas/CarrierMutationDetail'
    CarrierDeleteSummary:
      type: object
      required: [totalSubmitted, deleted, notFound]
      properties:
        totalSubmitted:
          type: integer
        deleted:
          type: integer
        notFound:
          type: integer
    CarrierDeleteDetail:
      type: object
      required: [dot, status]
      properties:
        dot:
          type: string
        status:
          type: string
          enum: [deleted, not_found]
    CarrierDeleteResponse:
      type: object
      required: [summary, details]
      properties:
        summary:
          $ref: '#/components/schemas/CarrierDeleteSummary'
        details:
          type: array
          items:
            $ref: '#/components/schemas/CarrierDeleteDetail'
    AlertInfo:
      type: object
      properties:
        alert_id:
          oneOf:
            - type: integer
            - type: string
        event_id:
          oneOf:
            - type: integer
            - type: string
        event_type:
          type: string
        dotnumber:
          type: string
        occurred_at:
          type: string
          format: date-time
        status:
          type: string
        created_at:
          type: string
          format: date-time
      additionalProperties: true
    AlertRow:
      type: object
      required: [info]
      properties:
        info:
          $ref: '#/components/schemas/AlertInfo'
        changes:
          type: object
          additionalProperties: true
          nullable: true
        carrier:
          type: object
          additionalProperties: true
          nullable: true
    AlertListResponse:
      type: object
      required: [rows, total, page, pageSize]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/AlertRow'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    AlertMutationSummary:
      type: object
      required: [totalSubmitted, updated, notFound]
      properties:
        totalSubmitted:
          type: integer
        updated:
          type: integer
        notFound:
          type: integer
    AlertMutationDetail:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [processed, unprocessed, not_found]
    AlertMutationResponse:
      type: object
      required: [summary, details]
      properties:
        summary:
          $ref: '#/components/schemas/AlertMutationSummary'
        details:
          type: array
          items:
            $ref: '#/components/schemas/AlertMutationDetail'
    ContractRecord:
      type: object
      properties:
        contract_id:
          oneOf:
            - type: integer
            - type: string
              format: uuid
        dotnumber:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true
        provider:
          type: string
          nullable: true
        external_id:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
      additionalProperties: true
    ContractEnvelope:
      type: object
      required: [contract, carrier]
      properties:
        contract:
          $ref: '#/components/schemas/ContractRecord'
        carrier:
          type: object
          additionalProperties: true
    ContractListResponse:
      type: object
      required: [contracts, total, page, pageSize]
      properties:
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/ContractEnvelope'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    ContractMutationProcessedSummary:
      type: object
      required: [totalSubmitted, updated, notFoundOrNotSigned]
      properties:
        totalSubmitted:
          type: integer
        updated:
          type: integer
        notFoundOrNotSigned:
          type: integer
    ContractMutationProcessedResponse:
      type: object
      required: [summary, details]
      properties:
        summary:
