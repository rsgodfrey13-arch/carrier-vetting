  /contracts/send/{dot}:
    post:
      tags: [Contracts]
      summary: Send contract
      description: |
        Sends a contract email to a carrier and creates a contract record in `SENT` status.
        This endpoint generates a signing token, stores the contract, and emails the carrier a signing link.
        This is the canonical send endpoint for v1 integrations (replaces legacy create-only send behavior).
      operationId: sendContract
      parameters:
        - $ref: '#/components/parameters/DotPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_contract_id
                - email_to
              properties:
                user_contract_id:
                  type: integer
                  description: Agreement template ID to send.
                  example: 12
                email_to:
                  type: string
                  format: email
                  description: Carrier email address.
                  example: dispatch@abctrucking.com
                carrier_name:
                  type: string
                  description: Optional carrier display name.
                  example: ABC Trucking
            example:
              user_contract_id: 12
              email_to: dispatch@abctrucking.com
              carrier_name: ABC Trucking
      responses:
        '200':
          description: Contract email sent successfully.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [ok, contract_id, status, link]
                properties:
                  ok:
                    type: boolean
                    example: true
                  contract_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: SENT
                  link:
                    type: string
                    example: https://carriershark.com/contract/abc123token
        '400':
          description: Missing required fields or invalid template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingFields:
                  value:
                    error: user_contract_id and email_to are required
                invalidTemplate:
                  value:
                    error: Invalid or unauthorized contract template
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to send contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to send contract

  /contracts/processed:
    patch:
      tags: [Contracts]
      summary: Mark contracts processed
      description: |
        Marks one or more `SIGNED` contracts as `PROCESSED`.
        IDs not found in your account or not currently signed are reported as not updated.
      operationId: markContractsProcessed
      requestBody:
        required: true
        content:
          application/json:
            schema:
