openapi: 3.0.3
info:
  title: CarrierShark API v1
  version: 1.0.0
  description: |
    The CarrierShark API allows companies to monitor carriers, receive compliance alerts, and manage digital carrier contracts.

    Base URL:
    https://carriershark.com/api/v1

    Authentication:
    All endpoints require a company API key.

    Authorization header format:

    Authorization: Bearer cs_live_your_api_key

    Test key example:
    cs_test_123456789
  contact:
    name: CarrierShark Support
    email: support@carriershark.com
    url: https://carriershark.com
  license:
    name: Proprietary
servers:
  - url: https://carriershark.com/api/v1
    description: Production v1 API
security:
  - bearerAuth: []
tags:
  - name: Carriers
    description: Search carriers and manage saved carriers.
  - name: Alerts
    description: Retrieve alerts and manage alert status.
  - name: Contracts
    description: Retrieve contracts and manage contract status.
  - name: Imports
    description: Check import limits and import carriers in bulk.
paths:
  /me/carriers/import-limits:
    get:
      tags: [Imports]
      summary: Get import limits
      description: |
        Returns your plan's carrier import limits and current usage.
        Use this before bulk imports to confirm total capacity and per-import caps.
      operationId: getCarrierImportLimits
      responses:
        '200':
          description: Import limits loaded successfully.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [plan, max_total, max_per_import, chunk_size, current_total]
                properties:
                  plan:
                    type: string
                  max_total:
                    type: integer
                  max_per_import:
                    type: integer
                  chunk_size:
                    type: integer
                  current_total:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to load import limits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to load import limits

  /me/carriers/import:
    post:
      tags: [Imports]
      summary: Import carriers
      description: |
        Imports multiple carrier DOT numbers into your saved carriers.
        DOT values are normalized, limits are enforced, and invalid or skipped entries are returned.
      operationId: importCarriers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dots]
              properties:
                dots:
                  type: array
                  description: Array of DOT numbers to import.
                  items:
                    type: string
            examples:
              bulkImport:
                value:
                  dots: ["336075", "123456"]
      responses:
        '200':
          description: Import was processed.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required:
                  - received
                  - valid_unique
                  - attempted
                  - inserted
                  - already_had
                  - rejected_due_to_import_limit
                  - rejected_due_to_plan_limit
                  - invalid_count
                  - invalid_sample
                properties:
                  received:
                    type: integer
                  valid_unique:
                    type: integer
                  attempted:
                    type: integer
                  inserted:
                    type: integer
                  already_had:
                    type: integer
                  rejected_due_to_import_limit:
                    type: integer
                  rejected_due_to_plan_limit:
                    type: integer
                  invalid_count:
                    type: integer
                  invalid_sample:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to import carriers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to import carriers

  /carriers:
    get:
      tags: [Carriers]
      summary: Search carrier database
      description: |
        Lookup-oriented carrier search endpoint for focused carrier retrieval.
        Broader extraction workflows should use saved carriers or enterprise workflows.
        Strict rate limits are intentional to discourage bulk polling.

        Allowed searches:
        - dot
        - mc
        - legalname with 3+ characters
        - dbaname with 3+ characters
        - city + state

        Blocked searches:
        - state alone
        - city alone
        - legalname shorter than 3 chars
        - dbaname shorter than 3 chars
      operationId: searchCarriers
      parameters:
        - $ref: '#/components/parameters/DotQuery'
        - name: mc
          in: query
          schema:
            type: string
        - name: legalname
          in: query
          schema:
            type: string
        - name: dbaname
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: page
          in: query
          description: Page number of results (starting at 1, maximum 5 for this endpoint).
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 1
        - name: pageSize
          in: query
          description: Number of results per page (maximum 25 for this endpoint).
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 25
      responses:
        '200':
          description: Carrier search results.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierListResponse'
              example:
                rows:
                  - dot: "336075"
                    dotnumber: "336075"
                    legalname: ACME TRANSPORT LLC
                    dbaname: ACME LOGISTICS
                    mc_number: "MC-654321"
                    phystreet: 123 MAIN ST
                    phycity: DALLAS
                    phystate: TX
                    phyzipcode: "75201"
                    phycountry: US
                    allowedtooperate: AUTHORIZED
                    safetyrating: SATISFACTORY
                    statuscode: A
                    totaldrivers: 12
                    totalpowerunits: 10
                    retrieval_date: '2026-03-15T00:00:00.000Z'
                    last_polled_at: '2026-03-30T18:42:31.000Z'
                    insurance_summary:
                      has_on_file: true
                      has_structured_coverages: true
                      is_expired: false
                      next_expiration_date: '2026-12-31'
                      auto_liability_limit: 1000000
                      cargo_limit: 100000
                      general_liability_limit: 1000000
                      coverage_count: 3
                total: 1
                page: 1
                pageSize: 25
        '400':
          description: Invalid carrier search input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                requiresValidSearch:
                  value:
                    error: Search requires dot, mc, legalname (3+ chars), dbaname (3+ chars), or city + state.
                stateAlone:
                  value:
                    error: state alone is too broad; combine it with city, legalname, or dbaname.
                cityAlone:
                  value:
                    error: city alone is too broad; include state.
                pageSizeLimit:
                  value:
                    error: pageSize cannot exceed 25.
                pageLimit:
                  value:
                    error: page cannot exceed 5 for carrier search.
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Carrier search rate limit exceeded. Please slow down.
        '500':
          description: Search failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Search failed

  /carriers/{dot}:
    get:
      tags: [Carriers]
      summary: Get carrier
      description: |
        Returns a single carrier record for the provided USDOT number.
        Includes standard carrier fields plus `cargo_carried` when available.
      operationId: getCarrierByDot
      parameters:
        - $ref: '#/components/parameters/DotPath'
      responses:
        '200':
          description: Carrier record with cargo information.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierDetail'
              example:
                dot: "336075"
                dotnumber: "336075"
                legalname: ACME TRANSPORT LLC
                dbaname: ACME LOGISTICS
                mc_number: "MC-654321"
                phystreet: 123 MAIN ST
                phycity: DALLAS
                phystate: TX
                phyzipcode: "75201"
                phycountry: US
                allowedtooperate: AUTHORIZED
                safetyrating: SATISFACTORY
                statuscode: A
                totaldrivers: 12
                totalpowerunits: 10
                retrieval_date: '2026-03-15T00:00:00.000Z'
                last_polled_at: '2026-03-30T18:42:31.000Z'
                address1: 123 MAIN ST
                address2: null
                city: DALLAS
                state: TX
                zip: "75201"
                retrieval_date_formatted: Mar 15, 2026 12:00 AM EST
                cargo_carried:
                  - General Freight
                  - Machinery
                insurance_coverages:
                  - id: 981
                    document_id: 442
                    coverage_type: AUTO LIABILITY
                    insurer_name: Great West Casualty Company
                    policy_number: GL-4459011
                    effective_date: '2026-01-01'
                    expiration_date: '2026-12-31'
                    limit_amount: 1000000
                    status: ACTIVE
                    is_expired: false
                  - id: 982
                    document_id: 442
                    coverage_type: CARGO
                    insurer_name: Great West Casualty Company
                    policy_number: CG-2087710
                    effective_date: '2026-01-01'
                    expiration_date: '2026-12-31'
                    limit_amount: 100000
                    status: ACTIVE
                    is_expired: false
                insurance_summary:
                  has_on_file: true
                  has_structured_coverages: true
                  is_expired: false
                  next_expiration_date: '2026-12-31'
                  auto_liability_limit: 1000000
                  cargo_limit: 100000
                  general_liability_limit: 1000000
                  coverage_count: 2
        '404':
          description: Carrier not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Carrier not found
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Database query failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Database query failed

  /me/carriers:
    get:
      tags: [Carriers]
      summary: List saved carriers
      description: |
        Returns the carriers saved to your account.
        Supports the same filters and pagination as carrier search.
      operationId: listMyCarriers
      parameters:
        - $ref: '#/components/parameters/DotQuery'
        - name: mc
          in: query
          schema:
            type: string
        - name: legalname
          in: query
          schema:
            type: string
        - name: dbaname
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Saved carriers list.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCarrierListResponse'
              example:
                rows:
                  - dot: "336075"
                    dotnumber: "336075"
                    legalname: ACME TRANSPORT LLC
                    dbaname: ACME LOGISTICS
                    mc_number: "MC-654321"
                    phystreet: 123 MAIN ST
                    phycity: DALLAS
                    phystate: TX
                    phyzipcode: "75201"
                    phycountry: US
                    allowedtooperate: AUTHORIZED
                    safetyrating: SATISFACTORY
                    statuscode: A
                    totaldrivers: 12
                    totalpowerunits: 10
                    retrieval_date: '2026-03-15T00:00:00.000Z'
                    last_polled_at: '2026-03-30T18:42:31.000Z'
                    added_at: '2026-03-01T14:25:00Z'
                    insurance_summary:
                      has_on_file: true
                      has_structured_coverages: true
                      is_expired: false
                      next_expiration_date: '2026-12-31'
                      auto_liability_limit: 1000000
                      cargo_limit: 100000
                      general_liability_limit: 1000000
                      coverage_count: 3
                total: 1
                page: 1
                pageSize: 25
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to load company carriers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to load company carriers
    post:
      tags: [Carriers]
      summary: Save carriers
      description: |
        Saves one or more carrier DOT numbers to your account.
        DOT values are normalized and reported as inserted, already saved, or invalid.
      operationId: addMyCarriers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dot]
              properties:
                dot:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
            examples:
              single:
                value:
                  dot: "336075"
              multiple:
                value:
                  dot: ["336075", "123456"]
      responses:
        '200':
          description: Carrier save attempt results.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierMutationResponse'
        '400':
          description: The request body omitted DOT values or none were valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                dotRequired:
                  value:
                    error: dot is required
                noValidDots:
                  value:
                    error: No valid DOT numbers provided
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to add carriers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to add carriers
    delete:
      tags: [Carriers]
      summary: Remove saved carriers
      description: |
        Removes one or more saved carriers from your account.
        Each submitted DOT is reported as deleted or not found.
      operationId: deleteMyCarriers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dot]
              properties:
                dot:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
            examples:
              single:
                value:
                  dot: "336075"
              multiple:
                value:
                  dot: ["336075", "123456"]
      responses:
        '200':
          description: Carrier delete attempt results.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierDeleteResponse'
        '400':
          description: The request body omitted DOT values or none were valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                dotRequired:
                  value:
                    error: dot is required
                noValidDots:
                  value:
                    error: No valid DOT numbers provided
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to remove carriers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to remove carriers

  /carriers/{dot}/alerts:
    get:
      tags: [Alerts]
      summary: List carrier alerts
      description: |
        Returns alerts for a tracked carrier.
        Filter by alert ID or status. Error-state alerts are excluded.
      operationId: listCarrierAlerts
      parameters:
        - $ref: '#/components/parameters/DotPath'
        - name: id
          in: query
          schema:
            type: string
          description: Alert identifier.
        - name: status
          in: query
          schema:
            type: string
          description: Alert status filter.
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Alert list for the carrier.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to load carrier alerts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to load carrier alerts

  /alerts:
    get:
      tags: [Alerts]
      summary: List alerts
      description: |
        Returns alerts across all tracked carriers in your account.
        Filter by alert ID, status, or DOT number. Error-state alerts are excluded.
      operationId: listAlerts
      parameters:
        - name: id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: dotnumber
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Alert list.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'
              example:
                rows:
                  - info:
                      alert_id: 46
                      event_id: evt_12345
                      event_type: carrier.updated
                      dotnumber: "336075"
                      occurred_at: '2026-03-15T10:15:00Z'
                      status: NEW
                      created_at: '2026-03-15T10:16:00Z'
                    changes:
                      allowedtooperate:
                        old: INACTIVE
                        new: AUTHORIZED
                    carrier:
                      dotnumber: "336075"
                      legalname: ACME TRANSPORT LLC
                total: 1
                page: 1
                pageSize: 25
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to load alerts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to load alerts

  /alerts/new:
    get:
      tags: [Alerts]
      summary: List new alerts
      description: |
        Returns alerts in `NEW` status only.
        Use this endpoint to poll for unprocessed alert activity.
      operationId: listNewAlerts
      parameters:
        - name: id
          in: query
          schema:
            type: string
        - name: dotnumber
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: New alert list.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to load NEW alerts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to load NEW alerts

  /alerts/processed:
    patch:
      tags: [Alerts]
      summary: Mark alerts processed
      description: |
        Marks one or more alerts as `PROCESSED`.
        Only matching alert IDs in your account are updated.
      operationId: markAlertsProcessed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alerts]
              properties:
                alerts:
                  type: array
                  items:
                    type: string
                  description: Numeric alert IDs.
            example:
              alerts: ["46", "47"]
      responses:
        '200':
          description: Alert update results.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertMutationResponse'
        '400':
          description: No valid numeric alert IDs were supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: alerts array is required (numeric ids)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Rate limit exceeded
        '500':
          description: Failed to mark alerts processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Failed to mark alerts processed

  /alerts/unprocessed:
    patch:
      tags: [Alerts]
      summary: Mark alerts new
      description: |
        Marks one or more alerts back to `NEW`.
        Only matching alert IDs in your account are updated.
      operationId: markAlertsUnprocessed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alerts]
              properties:
                alerts:
                  type: array
                  items:
                    type: string
                  description: Numeric alert IDs.
            example:
              alerts: ["46", "47"]
      responses:
