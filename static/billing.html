<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carrier Shark - Billing</title>

  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/style1.css" />
  <link rel="stylesheet" href="/static/css/signup.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>

<body class="auth-page">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div id="site-header" data-header="slim"></div>

<main class="page">
  <section class="auth-shell billing-min">
    <div class="auth-hero">
      <span class="auth-eyebrow">Billing</span>
      <h1 class="auth-title" id="billing-title">Confirm your plan.</h1>
      <p class="auth-subtitle" id="billing-subtitle">
        Review price, accept the Terms, then continue to Stripe.
      </p>
    </div>

    <div class="auth-card">
      <div class="auth-card-inner">

        <!-- Header row -->
        <div class="billing-toprow">
          <div class="summary-pill">
            Plan: <strong id="plan-label">Core</strong>
          </div>
          <a class="cs-btn cs-btn-ghost" href="/activate-plan">Change</a>
        </div>

        <!-- Minimal plan summary -->
        <div class="billing-summary">
          <div class="billing-summary-left">
            <div class="cs-label">Price</div>
            <div class="billing-price">
              <span id="price-label">$399</span><span class="billing-per">/mo</span>
            </div>
            <div class="cs-fineprint">Cancel anytime.</div>
          </div>

          <div class="billing-summary-right cs-fineprint">
            Secure checkout by Stripe. We never store card details.
          </div>
        </div>

        <!-- Terms agreement -->
        <div class="billing-terms cs-fineprint">
          <label class="billing-terms-label">
            <input type="checkbox" id="terms-checkbox" />
            <span>
              I agree to the <a href="/terms" target="_blank">Terms of Service</a>
              and <a href="/privacy" target="_blank">Privacy Policy</a>.
            </span>
          </label>

          <div id="terms-helper" class="cs-fineprint billing-terms-helper" style="display:none;">
            Please agree to the Terms to enable checkout.
          </div>
        </div>

        <!-- CTA -->
        <div class="cs-row cs-row-right">
          <button class="cs-btn cs-btn-primary" id="checkout-btn" type="button">
            <span id="checkout-btn-label">Continue</span>
          </button>
        </div>

        <!-- Error / loading -->
        <div class="cs-fineprint" id="billing-status" style="margin-top:10px; display:none;"></div>

        <input type="hidden" id="plan-input" value="core" />

      </div>
    </div>
  </section>
</main>

<script>
  (function () {
    const params = new URLSearchParams(location.search);
    const plan = (params.get("plan") || "core").toLowerCase();
    const context = (params.get("context") || "").toLowerCase(); // "upgrade"

    const pretty = { core: "Core", pro: "Pro", enterprise: "Enterprise" };
    const price  = { core: "$399", pro: "$999", enterprise: "Custom" };

    document.getElementById("plan-label").textContent = pretty[plan] || "Core";
    document.getElementById("plan-input").value = (pretty[plan] ? plan : "core");
    document.getElementById("price-label").textContent = price[plan] || "$399";

    const titleEl = document.getElementById("billing-title");
    const subEl = document.getElementById("billing-subtitle");
    const btnLabel = document.getElementById("checkout-btn-label");

    if (context === "upgrade") {
      if (titleEl) titleEl.textContent = "Confirm plan change.";
      if (subEl) subEl.textContent = "Accept the Terms. You’ll finalize billing in Stripe.";
      if (btnLabel) btnLabel.textContent = "Continue";
    } else {
      if (btnLabel) btnLabel.textContent = "Continue";
    }
  })();
</script>
  
  <script src="/js/pages/billing.js"></script>

  <!-- Sentry + shared -->
  <script
    src="https://js.sentry-cdn.com/1df77c56ba17c2098baf02e362c93be2.min.js"
    crossorigin="anonymous"
  ></script>

  
  <script src="/js/shared/sentry.js"></script>
  <script src="/js/shared/shared.js"></script>


  <footer id="site-footer"></footer>
</body>
</html>
