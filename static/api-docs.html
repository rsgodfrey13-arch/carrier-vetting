<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>API Documentation • Carrier Shark</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/style1.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <style>
    :root {
      --docs-bg-deep: #040b18;
      --docs-bg-panel: rgba(6, 18, 39, 0.88);
      --docs-bg-panel-strong: rgba(7, 20, 43, 0.96);
      --docs-bg-elevated: rgba(10, 28, 58, 0.94);
      --docs-bg-nav: rgba(8, 21, 45, 0.96);
      --docs-border: rgba(129, 188, 255, 0.14);
      --docs-border-strong: rgba(66, 198, 255, 0.24);
      --docs-text-primary: #f6fbff;
      --docs-text-secondary: rgba(228, 239, 255, 0.88);
      --docs-text-muted: rgba(185, 205, 233, 0.82);
      --docs-text-soft: rgba(152, 179, 215, 0.78);
      --docs-accent: #21c7ff;
      --docs-accent-strong: #78e2ff;
      --docs-code-bg: rgba(5, 15, 32, 0.96);
      --docs-shadow: 0 22px 60px rgba(0, 0, 0, 0.26);
    }

    .docs-shell {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 42px 20px 96px;
    }

    .docs-hero {
      margin-top: 28px;
      padding: 30px 34px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: linear-gradient(180deg, rgba(10, 22, 48, 0.92), rgba(5, 13, 30, 0.95));
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .docs-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(0, 183, 255, 0.22);
      background: rgba(0, 183, 255, 0.08);
      color: #8fdcff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .docs-title {
      margin: 0 0 12px;
      font-size: clamp(1.85rem, 3vw, 2.65rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #f4f8ff;
      max-width: 720px;
    }

    .docs-lede {
      margin: 0;
      max-width: 840px;
      font-size: 17px;
      line-height: 1.7;
      color: rgba(232, 240, 255, 0.82);
    }

    .docs-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .docs-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .docs-btn:hover {
      transform: translateY(-1px);
    }

    .docs-btn-primary {
      background: linear-gradient(180deg, #19b8ff, #0d9be5);
      color: #02111f;
      border-color: rgba(90, 210, 255, 0.45);
      box-shadow: 0 8px 22px rgba(0, 183, 255, 0.22);
    }

    .docs-btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      color: #e8f1ff;
    }

    .docs-card {
      margin-top: 24px;
      padding: 22px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background:
        radial-gradient(circle at top left, rgba(0, 183, 255, 0.08), transparent 36%),
        linear-gradient(180deg, rgba(7, 18, 39, 0.94), rgba(5, 12, 27, 0.98));
      box-shadow:
        var(--docs-shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .docs-card-inner {
      border-radius: 22px;
      overflow: visible;
      border: 1px solid var(--docs-border);
      background:
        linear-gradient(180deg, rgba(3, 10, 24, 0.86), rgba(2, 8, 20, 0.94));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 0 0 1px rgba(7, 187, 255, 0.03);
    }

    #redoc-container,
    #redoc-container .redoc-wrap {
      background: transparent !important;
    }

    #redoc-container .redoc-wrap {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
      color: var(--docs-text-secondary);
    }

    #redoc-container .api-content,
    #redoc-container .api-content p,
    #redoc-container .api-content li,
    #redoc-container .api-content span,
    #redoc-container .api-content div,
    #redoc-container .api-content td,
    #redoc-container .api-content label,
    #redoc-container .api-content section,
    #redoc-container .api-content small,
    #redoc-container .api-content [data-section-id] {
      color: var(--docs-text-secondary);
    }

    #redoc-container .api-content h1,
    #redoc-container .api-content h2,
    #redoc-container .api-content h3,
    #redoc-container .api-content h4,
    #redoc-container .api-content h5,
    #redoc-container .api-content strong,
    #redoc-container .api-content b,
    #redoc-container .api-content [role="heading"] {
      color: var(--docs-text-primary) !important;
    }

    #redoc-container .api-content a,
    #redoc-container .menu-content a,
    #redoc-container .api-content button,
    #redoc-container .menu-content button,
    #redoc-container .api-content svg,
    #redoc-container .menu-content svg {
      color: var(--docs-accent);
    }

    #redoc-container .menu-content {
      background:
        linear-gradient(180deg, rgba(10, 25, 52, 0.98), rgba(6, 18, 38, 0.98)) !important;
      border-right: 1px solid var(--docs-border) !important;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.03);
    }

    #redoc-container .menu-content ul,
    #redoc-container .menu-content li {
      background: transparent !important;
    }

#redoc-container .menu-content,
#redoc-container .menu-content div,
#redoc-container .menu-content label,
#redoc-container .menu-content a {
  color: var(--docs-text-muted) !important;
}

#redoc-container .menu-content a:hover,
#redoc-container .menu-content a:focus,
#redoc-container .menu-content li.active > label,
#redoc-container .menu-content li.active > a,
#redoc-container .menu-content [aria-current="true"],
#redoc-container .menu-content [data-item-id].active {
  color: var(--docs-text-primary) !important;
}

#redoc-container .menu-content label,
#redoc-container .menu-content a,
#redoc-container .menu-content button {
  transition: color 160ms ease, background-color 160ms ease, border-color 160ms ease;
}

    #redoc-container .menu-content li {
      border-radius: 14px;
    }



    #redoc-container .menu-content input,
    #redoc-container .menu-content [role="search"] input,
    #redoc-container .menu-content input[type="text"],
    #redoc-container .menu-content input[type="search"] {
      background: rgba(7, 19, 41, 0.98) !important;
      color: var(--docs-text-primary) !important;
      border: 1px solid var(--docs-border-strong) !important;
      border-radius: 14px !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(10, 26, 50, 0.35);
    }

    #redoc-container .menu-content input::placeholder,
    #redoc-container .menu-content [role="search"] input::placeholder {
      color: rgba(168, 194, 228, 0.68) !important;
    }

    #redoc-container .menu-content input:focus,
    #redoc-container .menu-content [role="search"] input:focus {
      outline: none;
      border-color: rgba(120, 226, 255, 0.58) !important;
      box-shadow:
        0 0 0 4px rgba(33, 199, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    #redoc-container .api-content {
      background: transparent !important;
    }

    #redoc-container .api-content > div,
    #redoc-container .api-content section,
    #redoc-container .api-content article,
    #redoc-container .api-content [data-section-id],
    #redoc-container .api-content table,
    #redoc-container .api-content tbody,
    #redoc-container .api-content thead,
    #redoc-container .api-content tr,
    #redoc-container .api-content td,
    #redoc-container .api-content th {
      border-color: var(--docs-border) !important;
    }

    #redoc-container .api-content table,
    #redoc-container .api-content div[role="table"] {
      background: rgba(6, 17, 36, 0.55) !important;
      border-radius: 16px;
      overflow: hidden;
    }

    #redoc-container .api-content th {
      background: rgba(9, 25, 50, 0.9) !important;
      color: var(--docs-text-primary) !important;
    }

    #redoc-container .api-content td {
      background: rgba(4, 13, 28, 0.72) !important;
      color: var(--docs-text-secondary) !important;
    }

    #redoc-container .api-content code,
    #redoc-container .api-content pre,
    #redoc-container .api-content samp,
    #redoc-container .api-content .redoc-json,
    #redoc-container .api-content [class*="token"],
    #redoc-container .api-content [class*="code"],
    #redoc-container .api-content [class*="sample"] {
      color: #eaf6ff !important;
    }

    #redoc-container .api-content pre,
    #redoc-container .api-content code,
    #redoc-container .api-content .redoc-json,
    #redoc-container .api-content [class*="codeBlock"],
    #redoc-container .api-content [class*="CodeBlock"],
    #redoc-container .api-content [class*="sample"] > div,
    #redoc-container .api-content [class*="sample"] pre {
      background: var(--docs-code-bg) !important;
      border: 1px solid rgba(96, 163, 255, 0.16) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    #redoc-container .api-content pre {
      border-radius: 18px !important;
      padding: 18px !important;
    }

    #redoc-container .api-content code {
      border-radius: 10px;
    }

    #redoc-container .api-content [class*="httpVerb"],
    #redoc-container .api-content [data-http-verb] {
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #redoc-container .api-content blockquote {
      background: rgba(17, 35, 68, 0.68) !important;
      border-left: 3px solid rgba(33, 199, 255, 0.72) !important;
      color: var(--docs-text-secondary) !important;
      border-radius: 0 14px 14px 0;
    }

    #redoc-container .api-content hr {
      border-color: rgba(120, 188, 255, 0.12) !important;
    }

    #redoc-container .api-content button,
    #redoc-container .api-content [role="button"] {
      border-radius: 12px;
    }

    #redoc-container .api-content [class*="badge"],
    #redoc-container .api-content [class*="tag"] {
      border-radius: 999px;
    }



    #redoc-container .redoc-wrap,
    #redoc-container .api-content {
      pointer-events: auto;
    }


    #redoc-container .api-content [class*="httpVerb"],
    #redoc-container .api-content [data-http-verb],
    #redoc-container .api-content span[class*="verb"],
    #redoc-container .api-content span[class*="Verb"] {
      color: #f6fbff !important;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 8px 18px rgba(0, 0, 0, 0.18);
      font-weight: 800 !important;
      letter-spacing: 0.04em;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="get"],
    #redoc-container .api-content [data-http-verb="get"] {
      background: linear-gradient(180deg, #166534, #14532d) !important;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="post"],
    #redoc-container .api-content [data-http-verb="post"] {
      background: linear-gradient(180deg, #075985, #0c4a6e) !important;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="put"],
    #redoc-container .api-content [data-http-verb="put"] {
      background: linear-gradient(180deg, #b45309, #92400e) !important;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="patch"],
    #redoc-container .api-content [data-http-verb="patch"] {
      background: linear-gradient(180deg, #0f766e, #115e59) !important;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="delete"],
    #redoc-container .api-content [data-http-verb="delete"] {
      background: linear-gradient(180deg, #be123c, #9f1239) !important;
    }

    #redoc-container .api-content [class*="httpVerb"][data-http-verb="options"],
    #redoc-container .api-content [data-http-verb="options"],
    #redoc-container .api-content [class*="httpVerb"][data-http-verb="head"],
    #redoc-container .api-content [data-http-verb="head"] {
      background: linear-gradient(180deg, #4338ca, #3730a3) !important;
    }

    #redoc-container .api-content :is(details, [class*="accordion"], [class*="Accordion"], [class*="collapsible"], [class*="Collapsible"]) {
      color: var(--docs-text-primary) !important;
      border-color: rgba(96, 163, 255, 0.16) !important;
    }






    @media (max-width: 900px) {
      .docs-shell {
        padding: 28px 16px 72px;
      }

      .docs-hero {
        padding: 24px 20px;
        border-radius: 22px;
      }

      .docs-card {
        padding: 14px;
        border-radius: 22px;
      }

      .docs-card-inner {
        border-radius: 18px;
      }

      .docs-title {
        font-size: clamp(1.75rem, 8vw, 2.2rem);
      }

      .docs-lede {
        font-size: 16px;
      }
    }

/* =========================================
   REAL FIXES FOR REDOC RESPONSE UI
   ========================================= */

/* Right-side response sample tabs */
#redoc-container li[data-rttab="true"] {
  background: rgba(7, 19, 41, 0.98) !important;
  color: #dcecff !important;
  border: 1px solid rgba(96, 163, 255, 0.18) !important;
  border-radius: 8px !important;
  box-shadow: none !important;
}

#redoc-container li[data-rttab="true"]:hover {
  background: rgba(10, 27, 54, 0.99) !important;
  color: #ffffff !important;
  border-color: rgba(120, 226, 255, 0.32) !important;
}

#redoc-container li[data-rttab="true"].react-tabs__tab--selected {
  background: linear-gradient(180deg, rgba(11, 43, 82, 0.98), rgba(8, 31, 63, 0.98)) !important;
  color: #ffffff !important;
  border-color: rgba(33, 199, 255, 0.42) !important;
}

/* Content-type bar under response tabs */
#redoc-container .api-content ul[role="tablist"] + div,
#redoc-container .api-content ul[role="tablist"] + div * {
  color: #eaf4ff !important;
}

#redoc-container .api-content ul[role="tablist"] + div {
  background: rgba(7, 19, 41, 0.98) !important;
  border: 1px solid rgba(96, 163, 255, 0.18) !important;
}

/* Main response accordion bars */
#redoc-container .api-content button:has(> div > p) {
  background: linear-gradient(180deg, rgba(8, 20, 41, 0.98), rgba(6, 16, 34, 0.98)) !important;
  color: #f6fbff !important;
  border: 1px solid rgba(96, 163, 255, 0.18) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04) !important;
}

#redoc-container .api-content button:has(> div > p):hover {
  background: linear-gradient(180deg, rgba(10, 27, 54, 0.99), rgba(8, 21, 43, 0.99)) !important;
  color: #ffffff !important;
  border-color: rgba(120, 226, 255, 0.32) !important;
}

#redoc-container .api-content button:has(> div > p) p {
  color: #f6fbff !important;
}

/* Expanded response body area */
#redoc-container .api-content button:has(> div > p)[aria-expanded="true"] {
  background: linear-gradient(180deg, rgba(11, 43, 82, 0.98), rgba(8, 31, 63, 0.98)) !important;
  border-color: rgba(33, 199, 255, 0.42) !important;
}

/* Kill any leftover white backgrounds in nearby response containers */
#redoc-container .api-content button:has(> div > p) > div,
#redoc-container .api-content button:has(> div > p) + div {
  background: transparent !important;
  color: #eaf4ff !important;
}

#redoc-container .menu-content a,
#redoc-container .menu-content button,
#redoc-container .menu-content label {
  cursor: pointer;
  pointer-events: auto;
  border-radius: 12px;
}

#redoc-container .menu-content a:hover,
#redoc-container .menu-content button:hover,
#redoc-container .menu-content label:hover {
  color: var(--docs-text-primary) !important;
}

#redoc-container .menu-content form,
#redoc-container .menu-content [role="search"] {
  padding: 8px 10px 0 10px;
}

html {
  scroll-behavior: auto;
}

#site-header {
  position: relative;
  z-index: 50;
}

.docs-shell {
  position: relative;
  z-index: 1;
}

/* Fix white boxes inside expanded endpoint panels */
#redoc-container .api-content input,
#redoc-container .api-content textarea,
#redoc-container .api-content select,
#redoc-container .api-content [role="textbox"],
#redoc-container .api-content [contenteditable="true"] {
  background: rgba(7, 19, 41, 0.98) !important;
  color: #f6fbff !important;
  border: 1px solid rgba(96, 163, 255, 0.18) !important;
  border-radius: 12px !important;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    0 0 0 1px rgba(10, 26, 50, 0.35);
}

#redoc-container .api-content input::placeholder,
#redoc-container .api-content textarea::placeholder {
  color: rgba(168, 194, 228, 0.68) !important;
}

#redoc-container .api-content input:focus,
#redoc-container .api-content textarea:focus,
#redoc-container .api-content select:focus {
  outline: none !important;
  border-color: rgba(120, 226, 255, 0.58) !important;
  box-shadow:
    0 0 0 4px rgba(33, 199, 255, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
}

/* Catch light panels ReDoc injects around those fields */
#redoc-container .api-content form,
#redoc-container .api-content fieldset,
#redoc-container .api-content label,
#redoc-container .api-content div[class*="field"],
#redoc-container .api-content div[class*="Field"],
#redoc-container .api-content div[class*="input"],
#redoc-container .api-content div[class*="Input"] {
  background: transparent !important;
  color: var(--docs-text-secondary) !important;
}
    
  </style>
</head>
<body class="carrier-list">

  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div id="site-header"></div>

  <main class="docs-shell">
    <section class="docs-hero">
      <div class="docs-kicker">API Documentation</div>
      <h1 class="docs-title">Carrier Shark developer docs</h1>
      <p class="docs-lede">
        Authenticate with your company API key and explore Carrier Shark endpoints for carriers, alerts, imports, and contracts.
      </p>

      <div class="docs-actions">
        <a class="docs-btn docs-btn-secondary" href="/account#api">Back to API settings</a>
      </div>
    </section>

    <section class="docs-card" aria-label="OpenAPI documentation">
      <div class="docs-card-inner">
        <div id="redoc-container"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="/js/shared/shared.js"></script>
  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('/openapi.yaml', {
      disableSearch: false,
      expandResponses: '200,201',
      hideDownloadButton: false,
      hideHostname: true,
      nativeScrollbars: false,
      pathInMiddlePanel: false,
      scrollYOffset: 0,
      requiredPropsFirst: true,
      sortPropsAlphabetically: false,
      theme: {
        colors: {
          primary: {
            main: '#21c7ff',
            light: '#78e2ff',
            dark: '#0a8dc8',
            contrastText: '#04111d'
          },
          success: {
            main: '#37d67a'
          },
          text: {
            primary: '#f6fbff',
            secondary: '#d7e7fa'
          },
          http: {
            get: '#166534',
            post: '#075985',
            put: '#b45309',
            options: '#4338ca',
            patch: '#0f766e',
            delete: '#be123c',
            basic: '#334155',
            link: '#075985',
            head: '#1d4ed8'
          },
          responses: {
            success: '#166534',
            error: '#9f1239',
            redirect: '#92400e',
            info: '#1d4ed8'
          },
          tonalOffset: 0.25
        },
        schema: {
          linesColor: 'rgba(129, 188, 255, 0.12)',
          defaultDetailsWidth: '55%'
        },
        typography: {
          fontFamily: 'Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          fontSize: '15px',
          lineHeight: '1.7',
          code: {
            fontFamily: 'ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
            fontSize: '14px',
            fontWeight: '500',
            color: '#f2f8ff',
            backgroundColor: 'rgba(8, 19, 38, 0.92)'
          },
          headings: {
            fontFamily: 'Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
            fontWeight: '700',
            lineHeight: '1.2',
            color: '#f8fbff'
          },
          links: {
            color: '#21c7ff',
            hover: '#78e2ff',
            visited: '#8fdcff'
          }
        },
        spacing: {
          unit: 5,
          sectionHorizontal: 32,
          sectionVertical: 28
        },
        breakpoints: {
          small: '50rem',
          medium: '85rem',
          large: '105rem'
        },
        menu: {
          backgroundColor: '#08152d',
          textColor: '#b9cde9',
          activeTextColor: '#f6fbff',
          groupItems: {
            textTransform: 'none'
          },
          level1Items: {
            textTransform: 'none'
          }
        },
        logo: {
          maxHeight: '0',
          maxWidth: '0',
          gutter: '0'
        },
        rightPanel: {
          backgroundColor: '#05101f',
          textColor: '#ebf5ff'
        },
        sidebar: {
          backgroundColor: '#08152d',
          textColor: '#b9cde9',
          activeTextColor: '#f6fbff'
        }
      }
