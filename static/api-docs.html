<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>API Documentation • Carrier Shark</title>

  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/style1.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <style>
    .docs-shell {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 42px 20px 96px;
    }

    .docs-hero {
      margin-top: 28px;
      padding: 30px 34px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: linear-gradient(180deg, rgba(10, 22, 48, 0.92), rgba(5, 13, 30, 0.95));
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .docs-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(0, 183, 255, 0.22);
      background: rgba(0, 183, 255, 0.08);
      color: #8fdcff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .docs-title {
      margin: 0 0 12px;
      font-size: clamp(1.85rem, 3vw, 2.65rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #f4f8ff;
      max-width: 720px;
    }

    .docs-lede {
      margin: 0;
      max-width: 840px;
      font-size: 17px;
      line-height: 1.7;
      color: rgba(232, 240, 255, 0.82);
    }

    .docs-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .docs-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .docs-btn:hover {
      transform: translateY(-1px);
    }

    .docs-btn-primary {
      background: linear-gradient(180deg, #19b8ff, #0d9be5);
      color: #02111f;
      border-color: rgba(90, 210, 255, 0.45);
      box-shadow: 0 8px 22px rgba(0, 183, 255, 0.22);
    }

    .docs-btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      color: #e8f1ff;
    }

    .docs-card {
      margin-top: 24px;
      padding: 22px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: linear-gradient(180deg, rgba(7, 18, 39, 0.94), rgba(5, 12, 27, 0.98));
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .docs-card-inner {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(3, 10, 24, 0.72);
    }

    .docs-card redoc {
      display: block;
    }

    .docs-card ::part(redoc-container) {
      background: transparent;
    }

    .docs-card :where(.redoc-wrap, .menu-content, .api-content, .redoc-json) {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (max-width: 900px) {
      .docs-shell {
        padding: 28px 16px 72px;
      }

      .docs-hero {
        padding: 24px 20px;
        border-radius: 22px;
      }

      .docs-card {
        padding: 14px;
        border-radius: 22px;
      }

      .docs-title {
        font-size: clamp(1.75rem, 8vw, 2.2rem);
      }

      .docs-lede {
        font-size: 16px;
      }
    }
  </style>
</head>
<body class="carrier-list">

  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div id="site-header"></div>

  <main class="docs-shell">
    <section class="docs-hero">
      <div class="docs-kicker">API Documentation</div>
      <h1 class="docs-title">Carrier Shark developer docs</h1>
      <p class="docs-lede">
        Authenticate with your company API key and explore Carrier Shark endpoints for carriers, alerts, imports, and contracts.
      </p>

      <div class="docs-actions">
        <a class="docs-btn docs-btn-secondary" href="/account#api">Back to API settings</a>
      </div>
    </section>

    <section class="docs-card" aria-label="OpenAPI documentation">
      <div class="docs-card-inner">
        <redoc spec-url="/static/openapi.yaml"></redoc>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="/js/shared/shared.js"></script>
  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
</body>
</html>
