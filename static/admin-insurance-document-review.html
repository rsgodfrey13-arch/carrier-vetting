<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Exceptions | Carrier Shark</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/style1.css" />
  <link rel="stylesheet" href="/static/css/admin-insurance-document-review.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body class="carrier-list">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div id="site-header"></div>

  <main class="review-shell">
    <header class="review-header">
      <div>
        <h1>Insurance Exceptions</h1>
        <p>Manage open document review and normalization insurance exceptions.</p>
      </div>
      <button id="refresh-btn" class="btn-ghost" type="button">Refresh</button>
    </header>

    <section class="review-card">
      <div id="status-banner" class="status-banner" hidden></div>

      <div class="tab-bar" role="tablist" aria-label="Insurance exception workflows">
        <button class="tab-btn is-active" type="button" role="tab" aria-selected="true" data-tab="document-review">
          Document Review
        </button>
        <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="normalization">
          Normalization
        </button>
      </div>

      <section class="tab-section" data-tab-section="document-review">
        <div class="table-wrap">
          <table class="review-table">
            <thead>
              <tr>
                <th>DOT</th>
                <th>Carrier</th>
                <th>Errors</th>
                <th>Uploaded</th>
                <th>PDF</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="doc-queue-body"></tbody>
          </table>
        </div>
        <div id="doc-empty-state" class="empty-state" hidden>No open document review exceptions.</div>
      </section>

      <section class="tab-section" data-tab-section="normalization" hidden>
        <div class="table-wrap">
          <table class="review-table normalization-table">
            <thead>
              <tr>
                <th>DOT</th>
                <th>Carrier</th>
                <th>Source Value</th>
                <th>Current Amount</th>
                <th>Uploaded</th>
                <th>PDF</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="norm-queue-body"></tbody>
          </table>
        </div>
        <div id="norm-empty-state" class="empty-state" hidden>No open normalization exceptions.</div>
      </section>
    </section>
  </main>

  <script src="/static/js/shared/sentry.js"></script>
  <script src="/static/js/shared/shared.js"></script>
  <script src="/static/js/pages/admin-insurance-document-review.js"></script>
</body>
</html>
